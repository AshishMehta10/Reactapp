apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: react-app
  template:
    metadata:
      labels:
        app: react-app
    spec:
      containers:
        - name: react-app
          image: 447367778057.dkr.ecr.ap-south-1.amazonaws.com/react-app:latest
          ports:
            - containerPort: 80   # match Dockerfile port
      imagePullSecrets:
        - name: ecr-secret
---
apiVersion: v1
kind: Service
metadata:
  name: react-app-service
spec:
  selector:
    app: react-app
  type: LoadBalancer
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80   # match container port
