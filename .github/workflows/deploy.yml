name: Deploy React App to EKS

on:
  push:
    branches: ['gamechanger111']
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout your code
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2️⃣ Configure AWS credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # 3️⃣ Login to ECR
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # 4️⃣ Debug variables (to confirm values)
      - name: Debug Variables
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "ACCOUNT_ID: $ACCOUNT_ID"
          echo "AWS_REGION: ap-south-1"
          echo "ECR Repository: react-app"
          echo "Full IMAGE_URI: 447367778057.dkr.ecr.ap-south-1.amazonaws.com/react-app"

      # 5️⃣ Build and push Docker image (hardcoded repo URI)
      - name: Build & Push Docker Image
        run: |
          IMAGE_URI=447367778057.dkr.ecr.ap-south-1.amazonaws.com/react-app
          echo "Building Docker image: $IMAGE_URI"
          docker build -t $IMAGE_URI .
          echo "Tagging Docker image..."
          docker tag $IMAGE_URI $IMAGE_URI:latest
          echo "Pushing Docker image to ECR..."
          docker push $IMAGE_URI:latest

      # 6️⃣ Update kubeconfig for EKS
      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ap-south-1

      # 7️⃣ Deploy to EKS using your manifests
      - name: Deploy to EKS
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

   

          
