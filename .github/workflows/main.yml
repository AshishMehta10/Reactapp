name: React App CI/CD

on:
  push:
    branches:   
      - '@gamechanger111'


jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm install

      # 4️⃣ Build the React app
      - name: Build app
        run: npm run build

      # 5️⃣ Set up Docker Buildx
      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      # 6️⃣ Log in to DockerHub
      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 7️⃣ Build Docker image
      - name: Build Docker image
        run: docker build -t ashishmehta10/my-react-app:latest .

      # 8️⃣ Push Docker image to DockerHub
      - name: Push Docker image
        run: docker push ashishmehta10/my-react-app:latest
