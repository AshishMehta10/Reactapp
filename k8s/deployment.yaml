apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: react-app
  template:
    metadata:
      labels:
        app: react-app
    spec:
      containers:
      - name: react-app
        image: 447367778057.dkr.ecr.ap-south-1.amazonaws.com/react-app:latest  # full ECR URI
        ports:
        - containerPort: 3000  # React app serves on 3000 inside the container
      imagePullSecrets:  # needed for private ECR
      - name: ecr-secret
---
apiVersion: v1
kind: Service
metadata:
  name: react-app-service
spec:
  selector:
    app: react-app
  type: LoadBalancer
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000  # must match containerPort
