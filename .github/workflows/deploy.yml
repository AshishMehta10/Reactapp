name: Deploy React App to EKS

on:
  push:
    branches: ['gamechanger111']
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout your repo
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2️⃣ Configure AWS credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # 3️⃣ Login to Amazon ECR
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # 4️⃣ Set Docker image variables
      - name: Set Image Variables
        run: |
          echo "IMAGE_URI=447367778057.dkr.ecr.ap-south-1.amazonaws.com/react-app" >> $GITHUB_ENV
          echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # 5️⃣ Build Docker image without cache & push
      - name: Build & Push Docker Image
        run: |
          echo "Building Docker image: $IMAGE_URI:$IMAGE_TAG"
          docker build --no-cache -t $IMAGE_URI:$IMAGE_TAG .
          docker tag $IMAGE_URI:$IMAGE_TAG $IMAGE_URI:latest
          echo "Pushing Docker images to ECR..."
          docker push $IMAGE_URI:$IMAGE_TAG
          docker push $IMAGE_URI:latest

      # 6️⃣ Update kubeconfig for EKS
      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ap-south-1

      # 7️⃣ Update deployment image and apply manifests
      - name: Deploy to EKS
        run: |
          kubectl set image deployment/react-app-deployment react-app=$IMAGE_URI:latest --record
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

     
