apiVersion: apps/v1
kind: Deployment
metadata:
  name: reactapp
  namespace: webapps
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reactapp
  template:
    metadata:
      labels:
        app: reactapp
    spec:
      containers:
        - name: reactapp
          image: ashishmehta10/reactapp:latest   # ✅ fixed
          imagePullPolicy: Always
          ports:
            - containerPort: 80   # ✅ fixed


apiVersion: v1
kind: Service
metadata:
  name: reactapp-service   # ✅ renamed
  namespace: webapps
spec:
  selector:
    app: reactapp
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80   # ✅ fixed
  type: LoadBalancer
